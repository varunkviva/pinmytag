<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Pin My Tag" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1f6b3a" />
    <link rel="canonical" href="https://pinmytag.com/" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- Favicons / App Icons (icon-only mark) -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png" />
    <link rel="shortcut icon" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <meta name="apple-mobile-web-app-title" content="Pin My Tag" />
    <meta name="application-name" content="Pin My Tag" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pin My Tag" />
    <meta property="og:url" content="https://pinmytag.com/" />
    <meta property="og:title" content="Pin My Tag — Coming Soon" />
    <meta property="og:description" content="A smart, modern way to pin, tag and track locations in real time. Something exciting is launching soon." />
    <meta property="og:image" content="favicon.png" />
    <meta property="og:image:alt" content="Pin My Tag icon" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:title" content="Pin My Tag — Coming Soon" />
    <meta name="twitter:description" content="A smart, modern way to pin, tag and track locations in real time. Something exciting is launching soon." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="favicon.png" />
    <meta name="twitter:image:alt" content="Pin My Tag icon" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Pin My Tag",
        "url": "https://pinmytag.com/",
        "description": "Pin My Tag is launching soon — a smart, modern way to pin, tag and track locations in real time.",
        "publisher": {
            "@type": "Organization",
            "name": "Pin My Tag",
            "logo": {
                "@type": "ImageObject",
                "url": "https://pinmytag.com/favicon.png"
            }
        }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Animated background blobs -->
    <div class="bg-blobs" aria-hidden="true">
        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="blob blob-3"></span>
    </div>

    <!-- Floating pins -->
    <div class="floating-pins" aria-hidden="true">
        <svg class="pin pin-1" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z" fill="currentColor"/></svg>
        <svg class="pin pin-2" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z" fill="currentColor"/></svg>
        <svg class="pin pin-3" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z" fill="currentColor"/></svg>
        <svg class="pin pin-4" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z" fill="currentColor"/></svg>
        <svg class="pin pin-5" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z" fill="currentColor"/></svg>
    </div>

    <main class="wrapper">
        <article class="card">
            <header class="logo-wrap">
                <div class="logo-ring">
                    <img class="logo-img" src="logo.png" alt="Pin My Tag logo" />
                </div>
            </header>

            <h1 class="brand visually-hidden">Pin My Tag</h1>

            <p class="tagline">Smart location tagging — something exciting is on the way.</p>

            <h2 class="coming-soon" aria-label="Coming Soon">
                <span>C</span><span>o</span><span>m</span><span>i</span><span>n</span><span>g</span>
                <span class="space">&nbsp;</span>
                <span>S</span><span>o</span><span>o</span><span>n</span>
            </h2>

            <!-- Countdown -->
            <div class="countdown" id="countdown" aria-live="polite" aria-label="Time until launch">
                <div class="unit"><span class="num" id="days">00</span><span class="label">Days</span></div>
                <div class="unit"><span class="num" id="hours">00</span><span class="label">Hours</span></div>
                <div class="unit"><span class="num" id="minutes">00</span><span class="label">Minutes</span></div>
                <div class="unit"><span class="num" id="seconds">00</span><span class="label">Seconds</span></div>
            </div>

            <!-- Notify form -->
            <form class="notify" onsubmit="event.preventDefault(); handleNotify(this);" aria-label="Notify me at launch">
                <label for="email" class="visually-hidden">Email address</label>
                <input id="email" type="email" required placeholder="Enter your email" autocomplete="email" />
                <button type="submit">
                    <span>Notify Me</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </form>
            <p class="notice" id="notice" role="status"></p>

            <nav class="social" aria-label="Social links">
                <a href="#" aria-label="Pin My Tag on Twitter" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 5.8c-.7.3-1.5.6-2.3.7.8-.5 1.5-1.3 1.8-2.2-.8.5-1.7.8-2.6 1a4.1 4.1 0 00-7 3.7A11.6 11.6 0 013 4.8a4.1 4.1 0 001.3 5.5c-.7 0-1.3-.2-1.9-.5v.1c0 2 1.4 3.7 3.3 4.1-.6.2-1.3.2-1.9.1.5 1.7 2.1 2.9 3.9 2.9A8.2 8.2 0 012 18.6 11.6 11.6 0 008.3 20.4c7.5 0 11.6-6.2 11.6-11.6v-.5c.8-.6 1.5-1.3 2.1-2.1z"/></svg></a>
                <a href="#" aria-label="Pin My Tag on Instagram" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg></a>
                <a href="#" aria-label="Pin My Tag on Facebook" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13 22v-8h3l1-4h-4V7.5c0-1.2.3-2 2-2h2V2.1C16.6 2 15.4 2 14.2 2 11.5 2 9.7 3.7 9.7 6.9V10H7v4h2.7v8H13z"/></svg></a>
                <a href="#" aria-label="Pin My Tag on LinkedIn" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5A2.5 2.5 0 112.5 6a2.5 2.5 0 012.48-2.5zM3 8.98h4V21H3V8.98zM9 8.98h3.8v1.6h.06c.53-.9 1.83-1.86 3.77-1.86 4.03 0 4.77 2.65 4.77 6.1V21h-4v-5.5c0-1.3-.03-3-1.83-3-1.83 0-2.11 1.43-2.11 2.9V21H9V8.98z"/></svg></a>
            </nav>

            <footer class="footer">© <span id="year"></span> Pin My Tag. All rights reserved.</footer>
        </article>
    </main>

    <script>
        (function() {
            const KEY = 'pinmytag_launch_target';
            let target = parseInt(localStorage.getItem(KEY) || '0', 10);
            if (!target || isNaN(target)) {
                target = Date.now() + 30 * 24 * 60 * 60 * 1000;
                localStorage.setItem(KEY, target.toString());
            }

            const d = document.getElementById('days');
            const h = document.getElementById('hours');
            const m = document.getElementById('minutes');
            const s = document.getElementById('seconds');
            const pad = n => n.toString().padStart(2, '0');

            function tick() {
                const now = Date.now();
                let diff = Math.max(0, target - now);
                const days = Math.floor(diff / 86400000); diff -= days * 86400000;
                const hours = Math.floor(diff / 3600000); diff -= hours * 3600000;
                const mins = Math.floor(diff / 60000); diff -= mins * 60000;
                const secs = Math.floor(diff / 1000);
                d.textContent = pad(days);
                h.textContent = pad(hours);
                m.textContent = pad(mins);
                s.textContent = pad(secs);
            }
            tick();
            setInterval(tick, 1000);

            document.getElementById('year').textContent = new Date().getFullYear();
        })();

        function handleNotify(form) {
            const notice = document.getElementById('notice');
            const email = form.querySelector('input[type=email]').value;
            notice.textContent = `Thanks! We'll notify ${email} at launch.`;
            notice.classList.add('show');
            form.reset();
        }
    </script>
</body>
</html>
